<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Nueva Venta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Registrar Venta</h2>

    <form action="/ventas/guardar" method="POST">

        <div class="mb-3">

            <label>Nombre del Cliente</label>

            <input
                type="text"
                name="cliente"
                class="form-control"
                placeholder="Ingrese el nombre del cliente"
                required>

        </div>

        <div class="mb-3">

            <label>Producto</label>

                <select id="producto" class="form-control">
                    <option value="">Seleccione...</option>

                    {% for producto in productos %}
                        <option value="{{ producto.nombre }}">
                            {{ producto.nombre }}
                        </option>
                    {% endfor %}
             </select>

        </div>

        <div class="mb-3">  
            <label>Color</label>

                <select id="color" class="form-control">
                    <option value="">Seleccione...</option>
                </select>
        </div>

        <div class="mb-3">

            <label>Unidad</label>

        <select
            id="id_producto"
            name="id_producto"
            class="form-control">

            <option value="">Seleccione...</option>

        </select>

        </div>

        <div class="mb-3">

            <label>Cantidad</label>

            <input
                type="number"
                name="cantidad"
                class="form-control"
                step="0.01"
                min="0.01"
                placeholder="Ej: 0.25"
                required>

        </div>

        <button class="btn btn-primary">
            Registrar Venta
        </button>

    </form>

</div>

<script>

const producto = document.getElementById("producto");
const color = document.getElementById("color");
const unidad = document.getElementById("id_producto");

producto.addEventListener("change", function () {

    color.innerHTML =
        '<option value="">Seleccione...</option>';

    unidad.innerHTML =
        '<option value="">Seleccione...</option>';

    fetch("/productos/colores/" + producto.value)

        .then(res => res.json())

        .then(data => {

            data.forEach(c => {

                color.innerHTML +=
                    `<option value="${c.color}">
                        ${c.color}
                    </option>`;

            });

        });

});

color.addEventListener("change", function () {

    unidad.innerHTML =
        '<option value="">Seleccione...</option>';

    fetch("/productos/unidades/" +
        producto.value +
        "/" +
        color.value)

        .then(res => res.json())

        .then(data => {

            data.forEach(u => {

                unidad.innerHTML +=
                    `<option value="${u.id_producto}">
                        ${u.descripcion}
                    </option>`;

            });

        });

});

</script>
</body>
</html>
