<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Nuevo Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Registrar Producto</h2>

    <form action="/productos/guardar" method="POST">

        <div class="mb-3">
            <label>Código</label>
            <input type="text" name="codigo" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <textarea name="descripcion" class="form-control" rows="4" required></textarea></textarea>
        </div>

        <div class="mb-3">
            <label>Marca</label>
            <input type="text" name="marca" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Categoría</label>
            <input type="text" name="categoria" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Color</label>
            <input type="text" name="color" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Precio Compra</label>
            <input type="number" step="0.01" name="precio_compra" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Precio Venta</label>
            <input type="number" step="0.01" name="precio_venta" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" name="stock_actual" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Guardar Producto
        </button>

        <a href="/productos" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
