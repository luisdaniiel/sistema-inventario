<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Proveedor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Editar Proveedor</h2>

    <form action="/proveedores/actualizar" method="POST">

        <input type="hidden"
               name="id_proveedor"
               value="{{ proveedor.id_proveedor }}">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text"
                   name="nombre"
                   class="form-control"
                   value="{{ proveedor.nombre }}">
        </div>

        <div class="mb-3">
            <label>Teléfono</label>
            <input type="text"
                   name="telefono"
                   class="form-control"
                   value="{{ proveedor.telefono }}">
        </div>

        <div class="mb-3">
            <label>Correo</label>
            <input type="email"
                   name="correo"
                   class="form-control"
                   value="{{ proveedor.correo }}">
        </div>

        <div class="mb-3">
            <label>Dirección</label>
            <input type="text"
                   name="direccion"
                   class="form-control"
                   value="{{ proveedor.direccion }}">
        </div>

        <button class="btn btn-primary">
            Actualizar
        </button>

    </form>

</div>

</body>
</html>
