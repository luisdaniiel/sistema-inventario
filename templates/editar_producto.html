<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Editar Producto</h2>

    <form action="/productos/actualizar" method="POST">

        <input type="hidden"
               name="id_producto"
               value="{{ producto.id_producto }}">

        <div class="mb-3">
            <label>Código</label>
            <input type="text"
                   name="codigo"
                   class="form-control"
                   value="{{ producto.codigo }}">
        </div>

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text"
                   name="nombre"
                   class="form-control"
                   value="{{ producto.nombre }}">
        </div>

        <div class="mb-3">
            <label>Marca</label>
            <input type="text"
                   name="marca"
                   class="form-control"
                   value="{{ producto.marca }}">
        </div>

        <div class="mb-3">
            <label>Precio Compra</label>
            <input type="number"
                   name="precio_compra"
                   class="form-control"
                   value="{{ producto.precio_compra }}">
        </div>

        <div class="mb-3">
            <label>Precio Venta</label>
            <input type="number"
                   name="precio_venta"
                   class="form-control"
                   value="{{ producto.precio_venta }}">
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number"
                   name="stock_actual"
                   class="form-control"
                   value="{{ producto.stock_actual }}">
        </div>

        <button class="btn btn-primary">
            Actualizar
        </button>

    </form>

</div>

</body>
</html>
