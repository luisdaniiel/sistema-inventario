{% extends 'base.html' %}

{% block contenido %}

<style>
    body {
        background-color: #eef1f6;
    }

    .password-card {
        border: none;
        border-radius: 16px;
        overflow: hidden;
        background: #ffffff;
    }

    .password-card .card-header {
        background: #1a1a27;
        color: #fff;
        border-bottom: 3px solid #6c5ce7;
        padding: 1.5rem 1.5rem 1.25rem;
    }

    .password-card .card-header h4 {
        margin: 0;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.6rem;
    }

    .password-card .card-header i {
        color: #a29bfe;
    }

    .password-card .card-body {
        padding: 2rem 1.75rem;
        background: #ffffff;
    }

    .form-label {
        font-weight: 500;
        color: #2c2c3a;
        margin-bottom: 0.4rem;
    }

    .input-group-text {
        background-color: #f1f0fb;
        border: 1px solid #e0dffc;
        border-right: none;
        color: #6c5ce7;
    }

    .form-control {
        border: 1px solid #e0dffc;
        border-left: none;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #cfc9fb;
    }

    .input-group:focus-within {
        box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.18);
        border-radius: 8px;
    }

    .toggle-pass {
        cursor: pointer;
        background-color: #f1f0fb;
        border: 1px solid #e0dffc;
        border-left: none;
    }

    .btn-guardar {
        background: #1a1a27;
        border: none;
        padding: 0.65rem;
        font-weight: 600;
        border-radius: 8px;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn-guardar:hover {
        background: #6c5ce7;
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(108, 92, 231, 0.35);
    }

    .alert {
        border-radius: 10px;
    }

    .alert-danger {
        background-color: #fdeaea;
        border: none;
        color: #b03a3a;
    }

    .alert-success {
        background-color: #eafaf1;
        border: none;
        color: #2f9e5b;
    }
</style>

<div class="container" style="max-width:500px;">

    <div class="card password-card shadow">

        <div class="card-header">
            <h4><i class="bi bi-shield-lock-fill"></i> Cambiar contraseña</h4>
        </div>

        <div class="card-body">

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <div>{{ error }}</div>
            </div>
            {% endif %}

            {% if exito %}
            <div class="alert alert-success d-flex align-items-center gap-2">
                <i class="bi bi-check-circle-fill"></i>
                <div>{{ exito }}</div>
            </div>
            {% endif %}

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Contraseña actual</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input
                            type="password"
                            name="actual"
                            id="actual"
                            class="form-control"
                            required>
                        <span class="input-group-text toggle-pass" onclick="togglePass('actual', this)">
                            <i class="bi bi-eye-fill"></i>
                        </span>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nueva contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input
                            type="password"
                            name="nueva"
                            id="nueva"
                            class="form-control"
                            required>
                        <span class="input-group-text toggle-pass" onclick="togglePass('nueva', this)">
                            <i class="bi bi-eye-fill"></i>
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirmar nueva contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input
                            type="password"
                            name="confirmar"
                            id="confirmar"
                            class="form-control"
                            required>
                        <span class="input-group-text toggle-pass" onclick="togglePass('confirmar', this)">
                            <i class="bi bi-eye-fill"></i>
                        </span>
                    </div>
                </div>

                <button class="btn btn-guardar text-white w-100">
                    <i class="bi bi-save2-fill"></i> Guardar cambios
                </button>

            </form>

        </div>

    </div>

</div>

<script>
    function togglePass(id, el) {
        const input = document.getElementById(id);
        const icon = el.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
        }
    }
</script>

{% endblock %}
