
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema Inventario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    background:#f4f6f9;
}

.sidebar{

    width:250px;
    height:100vh;

    position:fixed;
    left:0;
    top:0;

    background:#212529;
    color:white;

    padding-top:20px;
}

.sidebar h3{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{

    display:block;
    color:white;

    text-decoration:none;

    padding:15px;
}

.sidebar a:hover{
    background:#343a40;
}

.content{

    margin-left:250px;
    padding:30px;
}

.card-dashboard{

    border:none;
    border-radius:15px;

    box-shadow:0 0 15px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="sidebar">

    <h3>🎨 Inventario </h3>

    <a href="/">🏠 Dashboard</a>

    <a href="/productos">📦 Productos</a>

    <a href="/proveedores">🚚 Proveedores</a>

    <a href="/compras">🛒 Compras</a>

    <a href="/ventas">💰 Ventas</a>

    <a href="/informes">📊 Informes</a>

</div>

<div class="content">

{% block contenido %}

{% endblock %}

</div>

</body>
</html>
