<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Nuevo Proveedor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Registrar Proveedor</h2>

    <form action="/proveedores/guardar"
          method="POST">

        <div class="mb-3">

            <label>Nombre</label>

            <input
                type="text"
                name="nombre"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Teléfono</label>

            <input
                type="text"
                name="telefono"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>Correo</label>

            <input
                type="email"
                name="correo"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>Dirección</label>

            <input
                type="text"
                name="direccion"
                class="form-control">

        </div>

        <button class="btn btn-primary">
            Guardar
        </button>

    </form>

</div>

</body>
</html>
