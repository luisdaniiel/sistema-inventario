<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión · INVENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Acento tomado del panel/sidebar oscuro del dashboard, en vez de azul */
    --accent:#1b2030;
    --accent-soft:#2a3145;
    --accent-bright:#3a4260;
    --paper:#f5f7fb;
    --ink:#16203a;
    --muted:#7c88a3;
    --line:#e4e8f0;
    --danger:#e8455c;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--paper);
  }

  .screen{
    min-height:100vh;
    display:flex;
  }

  /* ---------- FORM PANEL ---------- */
  .panel{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 32px;
    background:var(--paper);
  }
  .form-wrap{
    width:100%;
    max-width:380px;
  }

  .form-wrap .mobile-logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:36px;
  }
  .form-wrap .mobile-logo img{height:32px;}
  .form-wrap .mobile-logo span{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--ink);
    letter-spacing:.02em;
  }

  .form-wrap .eyebrow{
    font-size:12px;
    font-weight:600;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0 0 10px;
  }
  .form-wrap h2{
    font-family:'Sora',sans-serif;
    font-size:27px;
    font-weight:700;
    margin:0 0 8px;
    color:var(--ink);
  }
  .form-wrap .sub{
    font-size:14px;
    color:var(--muted);
    margin:0 0 30px;
  }

  .alert-custom{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:#fdeeef;
    border:1px solid #f6c9ce;
    color:#a3253a;
    font-size:13.5px;
    padding:12px 14px;
    border-radius:10px;
    margin-bottom:22px;
  }

  .field{margin-bottom:20px;}
  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:7px;
  }
  .input-shell{
    position:relative;
    display:flex;
    align-items:center;
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:11px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .input-shell:focus-within{
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(27,32,48,.12);
  }
  .input-shell svg{
    flex:none;
    margin-left:14px;
    stroke:var(--muted);
  }
  .input-shell:focus-within svg{stroke:var(--accent);}
  .input-shell input{
    width:100%;
    border:0;
    outline:0;
    background:transparent;
    padding:12px 12px;
    font-size:14.5px;
    font-family:'Inter',sans-serif;
    color:var(--ink);
  }
  .input-shell .toggle-pass{
    margin-right:10px;
    cursor:pointer;
    flex:none;
    color:var(--muted);
    display:flex;
  }

  .row-between{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:-4px 0 26px;
    font-size:13px;
  }
  .remember{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--muted);
  }
  .remember input{accent-color:var(--accent);}
  .row-between a{
    color:var(--accent);
    text-decoration:none;
    font-weight:500;
  }
  .row-between a:hover{text-decoration:underline;}

  .btn-primary{
    width:100%;
    border:0;
    border-radius:11px;
    padding:13px;
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    color:#fff;
    background:linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 100%);
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 10px 24px -8px rgba(27,32,48,.55);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 14px 28px -8px rgba(27,32,48,.65);}
  .btn-primary:active{transform:translateY(0);}
  .btn-primary:focus-visible, .input-shell input:focus-visible, a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  .foot-note{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-top:26px;
  }
  .foot-note a{color:var(--accent);font-weight:600;text-decoration:none;}
  .foot-note a:hover{text-decoration:underline;}

  @media (max-width:920px){
    .panel{padding:48px 24px;}
  }
</style>
</head>
<body>

<div class="screen">

  <!-- Panel de formulario -->
  <main class="panel">
    <div class="form-wrap">

      <div class="mobile-logo">
        <span>INVENT</span>
      </div>

      <p class="eyebrow">Bienvenido de nuevo</p>
      <h2>Inicia sesión</h2>
      <p class="sub">Ingresa tus credenciales para continuar en tu cuenta.</p>

      {% with mensajes = get_flashed_messages() %}
        {% if mensajes %}
          <div class="alert-custom">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex:none;margin-top:1px;">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>{{ mensajes[0] }}</span>
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST">

        <div class="field">
          <label for="usuario">Usuario</label>
          <div class="input-shell">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="usuario" name="usuario" placeholder="tu.usuario" required autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label for="contrasena">Contraseña</label>
          <div class="input-shell">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required autocomplete="current-password">
            <span class="toggle-pass" id="togglePass" title="Mostrar/ocultar contraseña">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </div>
        </div>

        <div class="row-between">
          <label class="remember">
            <input type="checkbox" name="recordar">
            Recordarme
          </label>
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>

      <p class="foot-note">¿Aún no tienes cuenta? <a href="#">Contacta a tu administrador</a></p>
    </div>
  </main>

</div>

<script>
  const toggle = document.getElementById('togglePass');
  const passInput = document.getElementById('contrasena');
  if (toggle && passInput){
    toggle.addEventListener('click', () => {
      const isPass = passInput.type === 'password';
      passInput.type = isPass ? 'text' : 'password';
    });
  }
</script>

</body>
</html>
